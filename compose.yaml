version: '3.8'

services:
  techrocket-lps:
    image: davs933/techrocket-lps:main
    networks:
      - web
    deploy:
      placement:
        constraints:
          - node.role == manager
    labels:
      - "traefik.enable=true"
      # Regra de domínios unificada incluindo techrocket.site
      - "traefik.http.routers.techrocket-lps.rule= Host(`techrocket.site`) || Host(`maternidade.techrocket.site`) || Host(`institutombraga.com.br`)"
      - "traefik.http.routers.techrocket-lps.entrypoints=websecure"
      - "traefik.http.routers.techrocket-lps.tls=true"
      - "traefik.http.routers.techrocket-lps.tls.certresolver=lets-encrypt"
      # Essencial no Swarm para o Traefik encontrar a porta do Apache
      - "traefik.http.services.techrocket-lps.loadbalancer.server.port=80"

networks:
  web:
    external: true
